name: Merged PR Handler

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  handle-merged-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Debug Info
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Event action: ${{ github.event.action }}"
          echo "PR number: ${{ github.event.pull_request.number }}"
          echo "PR title: ${{ github.event.pull_request.title }}"
          echo "Target branch: ${{ github.event.pull_request.base.ref }}"
      
      - name: Process merged PR
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const targetBranch = pr.base.ref;
            
            console.log(`Processing merged PR #${prNumber} to ${targetBranch}`);
            
            // Extract issue numbers from PR body using regex
            const prBody = pr.body || '';
            const issueRefs = prBody.match(/(close[sd]?|fix(es|ed)?|resolve[sd]?)\s*:?\s*#(\d+)/gi) || [];
            const issueNumbers = issueRefs.map(ref => parseInt(ref.match(/#(\d+)/)[1]));
            
            if (issueNumbers.length === 0) {
              console.log('No issue references found in PR');
              return;
            }
            
            console.log(`Found referenced issues: ${issueNumbers.join(', ')}`);
            
            // Process each referenced issue
            for (const issueNumber of issueNumbers) {
              console.log(`Processing issue #${issueNumber}`);
              
              try {
                if (targetBranch === 'develop') {
                  // Add merged-to-develop label
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    labels: ['merged-to-develop']
                  });
                  
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    body: `Implementation for this issue has been merged to the develop branch in PR #${prNumber}`
                  });
                  
                  console.log(`Added merged-to-develop label and comment to issue #${issueNumber}`);
                }
                else if (targetBranch === 'main') {
                  // Add released label
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    labels: ['released']
                  });
                  
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    body: `This feature has been released to production in PR #${prNumber}`
                  });
                  
                  console.log(`Added released label and comment to issue #${issueNumber}`);
                }
              } catch (error) {
                console.error(`Error processing issue #${issueNumber}: ${error.message}`);
              }
            }
