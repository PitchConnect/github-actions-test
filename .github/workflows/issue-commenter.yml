name: Issue Commenter

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  add-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Debug Info
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Event action: ${{ github.event.action }}"
          echo "Issue number: ${{ github.event.issue.number }}"
          echo "Issue title: ${{ github.event.issue.title }}"
      
      - name: Add welcome comment
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.issue.number;
            
            console.log(`Adding welcome comment to issue #${issueNumber}`);
            
            const commentBody = `
## Welcome!

Thank you for opening this issue! Our team will review it soon.

Please make sure you've checked our contribution guidelines.
            `;
            
            try {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: commentBody
              });
              console.log(`Successfully added welcome comment to issue #${issueNumber}`);
            } catch (error) {
              console.error(`Error adding comment to issue #${issueNumber}: ${error.message}`);
            }
